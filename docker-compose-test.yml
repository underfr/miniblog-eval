services:
  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - '3316:3306'
    volumes:
      - ./db_data_test:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d/:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}", "-P", "3316"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks: 
      miniblog_net:

  app:
    image: php:8.2-apache
    command:
      bash -c "
      apt-get update && apt-get install -y msmtp &&
      echo 'host mailhog' > /etc/msmtprc &&
      echo 'port 1025' >> /etc/msmtprc &&
      echo 'from webmaster@miniblog.local' >> /etc/msmtprc &&
      echo 'sendmail_path=/usr/bin/msmtp -t' > /usr/local/etc/php/conf.d/mail.ini &&
      docker-php-ext-install pdo_mysql &&
      apache2-foreground"
    ports:
      - '8090:80'
    volumes:
      - ./app:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - SMTP_HOST=mailhog
      - SMTP_PORT=1035
    depends_on:
      db: 
        condition: service_healthy
    restart: unless-stopped
    networks: 
      miniblog_net:

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - 8091:80
    environment:
      - PMA_HOST=db
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks: 
      miniblog_net:
  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    ports:
      - 1035:1025
      - 8035:8025
    networks: 
      miniblog_net:
      
volumes:
  db_data:

networks:
  miniblog_net:
    driver: bridge